# Configuração mínima do projeto Supabase (para o CLI).
project_id = "interno-uplab"

[functions.admin-create-user]
# Exige JWT válido para invocar; a checagem de admin é feita dentro da função.
verify_jwt = true

[functions.webhook-zap]
# Webhook público do ZapResponder (sem JWT); protegido por ?secret=.
verify_jwt = false

[functions.zap-conversa]
# Exige JWT; a checagem de usuário interno é feita dentro da função.
verify_jwt = true

[functions.zap-info]
# Exige JWT; a checagem de admin é feita dentro da função.
verify_jwt = true
